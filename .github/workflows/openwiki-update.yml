name: OpenWiki Update

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write 

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 1. Clonamos el repositorio de OpenWiki en una carpeta temporal
      - name: Clone and Build OpenWiki
        run: |
          npm install -g pnpm
          git clone https://github.com/langchain-ai/openwiki.git /tmp/openwiki
          cd /tmp/openwiki
          pnpm install
          pnpm run build
          npm link # Esto registra el comando "openwiki" globalmente en la Action

      # 2. Ahora sí, ejecutamos la herramienta desde nuestro repositorio
      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          OPENWIKI_PROVIDER: openai
          OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
          OPENAI_API_KEY: ${{ secrets.GOOGLE_API_KEY }} 
          OPENWIKI_MODEL_ID: gemini-1.5-pro

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.
            
            This PR was generated by the scheduled OpenWiki workflow.
