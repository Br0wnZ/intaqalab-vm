name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: '0 8 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenWiki
        run: npm install -g https://github.com/langchain-ai/openwiki.git

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          # TODO: Replace with your preferred inference provider and model you want
          # OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_PROVIDER: openai
          OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
          OPENAI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENWIKI_MODEL_ID: gemini-1.5-pro
          # LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          # LANGCHAIN_PROJECT: openwiki
          # LANGCHAIN_TRACING_V2: "true"

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: 'docs: update OpenWiki'
          title: 'docs: update OpenWiki'
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
