<body class="h-screen flex bg-gray-100">
  <aside
    class="relative bg-white text-black flex flex-col overflow-hidden transition-[width] duration-200 ease-in-out"
    [class.w-80]="!menuCollapsed()"
    [class.w-25]="menuCollapsed()"
  >
    <app-menu-left [collapsed]="menuCollapsed()" (collapsedChange)="menuCollapsed.set($event)" />
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">
    <app-header data-testid="header" (logout)="logoffAndRevokeTokens()"></app-header>
    <main class="flex-1 py-6 px-4 overflow-y-auto bg-gray-50">
      <app-breadcrumb />
      <lib-loader />
      <div [class.hidden]="!featureFlags.tabsNavigation() || activeRoutedView()">
        <lib-tabs-top
          [tabToAdd]="tabToAdd()"
          (actionTabs)="actionTabsHandler($event)"
          (tabChanged)="onTabChanged($event)"
        ></lib-tabs-top>
      </div>
      <div [class.hidden]="featureFlags.tabsNavigation() && !activeRoutedView()">
        <router-outlet />
      </div>
    </main>
  </div>
</body>
